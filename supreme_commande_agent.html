<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Suprême — Commander</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0D0D0D;--surface:#1A1A1A;--surface2:#242424;--gold:#FFB800;--white:#F5F5F0;--muted:#666;--green:#00D26A;--border:rgba(255,255,255,0.08)}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.logo-box{width:42px;height:42px;border-radius:12px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:16px}
.status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.cuisine-btn{background:rgba(255,184,0,0.15);border:1px solid rgba(255,184,0,0.3);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--gold);cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px}

.content{padding:14px;max-width:480px;margin:0 auto;padding-bottom:30px}
.progress{background:var(--surface);border-radius:4px;height:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width 0.4s}

.msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;min-height:160px}
.msg{max-width:85%;padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.55;white-space:pre-wrap;animation:fadein 0.3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start}
.msg.user{background:var(--gold);color:#000;font-weight:500;border-bottom-right-radius:4px;align-self:flex-end}
.typing{align-self:flex-start;background:var(--surface);border:1px solid var(--border);padding:10px 16px;border-radius:18px 18px 18px 4px;display:none;gap:5px}
.typing.show{display:flex}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:b 1.2s infinite}
.tdot:nth-child(2){animation-delay:0.2s}
.tdot:nth-child(3){animation-delay:0.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.choices{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.choice{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:9px 16px;font-size:13px;cursor:pointer;color:var(--white);transition:all 0.15s}
.choice:active{background:var(--surface2);border-color:var(--gold)}

.input-row{display:flex;gap:8px;margin-bottom:12px}
.inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--white);outline:none}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted)}
.send{padding:11px 18px;background:var(--gold);color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}

.summary{background:var(--surface);border:1.5px solid rgba(255,184,0,0.4);border-radius:16px;padding:16px;margin-bottom:12px;display:none}
.summary.show{display:block}
.summary h3{font-family:'Syne',sans-serif;font-size:14px;color:var(--gold);margin-bottom:12px}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-key{color:var(--muted)}
.sum-val{color:var(--white);font-weight:500;text-align:right;max-width:65%}
.sent-badge{background:rgba(0,210,106,0.15);border:1px solid rgba(0,210,106,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--green);text-align:center;margin-top:10px;display:none}
.sent-badge.show{display:block}
.reset{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;display:block;margin:8px auto;font-family:'DM Sans',sans-serif}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-box">🔥</div>
    <div>
      <div class="brand">Suprême 974</div>
      <div class="status"><div class="dot"></div>Agent IA actif</div>
    </div>
  </div>
  <a href="supreme_cuisine.html" class="cuisine-btn">👨‍🍳 Cuisine</a>
</div>

<div class="content">
  <br>
  <div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="msgs" id="msgs"></div>
  <div class="typing" id="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>
  <div class="choices" id="choices"></div>
  <div class="input-row" id="input-row" style="display:none">
    <input class="inp" id="inp" placeholder="">
    <button class="send" onclick="sendInput()">→</button>
  </div>
  <div class="summary" id="summary"></div>
  <div class="sent-badge" id="sent-badge">✅ Commande envoyée en cuisine automatiquement !</div>
  <button class="reset" onclick="resetDemo()">🔄 Nouvelle commande</button>
</div>

<script>
const flow = [
  {
    ai: "Bonjour, Suprême Saint-Denis ! 🔥 Je suis l'assistant virtuel. Pour quelle heure souhaitez-vous passer récupérer votre commande ?",
    choices: ["Dès que possible ⚡", "Dans 15 min", "Dans 30 min", "Dans 45 min", "Je précise l'heure"]
  },
  {
    ai: "Quelle heure exactement ?",
    input: true,
    placeholder: "Ex: 12h30 ou 19h45",
    skipIf: (d) => d.heure !== "Je précise l'heure"
  },
  {
    ai: "Voici notre menu :\n\n🥙 Kebab — 12,90€\n🥙 Kebab Berliner — 14,90€\n🌯 Tacos — 13,90€\n🌯 Tacos Chèvre Miel — 14,90€\n🥙 Dürüm — 12,90€\n🍔 Burger Maison — 12,90€\n🍔 Burger Seguin — 14,90€\n🍗 Chicken Tenders — 11,90€\n\nQue désirez-vous ?",
    choices: ["🥙 Kebab — 12,90€", "🌯 Tacos — 13,90€", "🥙 Dürüm — 12,90€", "🍔 Burger Maison — 12,90€", "🌯 Tacos Chèvre Miel — 14,90€", "🍔 Burger Seguin — 14,90€", "🍗 Chicken Tenders — 11,90€", "Voir plus..."]
  },
  {
    ai: "Souhaitez-vous ajouter quelque chose ?",
    choices: ["🍟 Frites — 4,00€", "🥤 Boisson — 3,00€", "🍟 Frites + 🥤 Boisson — 7,00€", "Non merci"]
  },
  {
    ai: "Avez-vous des allergènes ou intolérances alimentaires ?",
    choices: ["Aucune allergie ✅", "🌾 Gluten", "🥛 Lactose", "🥜 Arachides", "🐟 Poisson", "Autre allergie"]
  },
  {
    ai: "Votre nom et prénom pour la commande ?",
    input: true,
    placeholder: "Ex: Karim Nassur"
  },
  {
    ai: "Votre numéro de téléphone ?",
    input: true,
    placeholder: "Ex: 0692 68 99 77"
  },
  { final: true }
];

const keys = [null, 'heure', 'heure_precise', 'plat', 'extra', 'allergie', 'nom', 'tel'];
let step = 0, data = {};

function addMsg(text, type) {
  if (!text) return;
  const el = document.createElement('div');
  el.className = 'msg ' + type;
  el.textContent = text;
  document.getElementById('msgs').appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function showChoices(choices) {
  const el = document.getElementById('choices');
  el.innerHTML = '';
  if (!choices) return;
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c;
    btn.onclick = () => handleChoice(c);
    el.appendChild(btn);
  });
}

function showInput(placeholder) {
  const row = document.getElementById('input-row');
  const inp = document.getElementById('inp');
  row.style.display = 'flex';
  inp.placeholder = placeholder || '';
  inp.value = '';
  setTimeout(() => inp.focus(), 100);
  inp.onkeydown = (e) => { if(e.key==='Enter') sendInput(); };
}

function sendInput() {
  const val = document.getElementById('inp').value.trim();
  if (!val) return;
  document.getElementById('input-row').style.display = 'none';
  handleChoice(val);
}

function handleChoice(val) {
  addMsg(val, 'user');
  showChoices([]);
  if (keys[step]) data[keys[step]] = val;
  step++;
  while (step < flow.length && !flow[step].final && flow[step].skipIf && flow[step].skipIf(data)) step++;
  document.getElementById('prog').style.width = Math.min(100, (step/(flow.length-1))*100) + '%';
  document.getElementById('typing').classList.add('show');
  setTimeout(() => {
    document.getElementById('typing').classList.remove('show');
    const s = flow[step];
    if (!s || s.final) { buildFinal(); return; }
    const text = typeof s.ai === 'function' ? s.ai(data) : s.ai;
    if (text) addMsg(text, 'ai');
    if (s.input) showInput(s.placeholder);
    else showChoices(s.choices);
  }, 800);
}

function buildFinal() {
  const heure = data.heure_precise || data.heure || 'Dès que possible';
  const msg = `Commande enregistrée ! 🔥\n\n🛒 ${data.plat}${data.extra && data.extra !== "Non merci" ? "\n➕ " + data.extra : ""}${data.allergie && data.allergie !== "Aucune allergie ✅" ? "\n⚠️ Allergie : " + data.allergie : ""}\n⏱ Retrait : ${heure}\n👤 ${data.nom}\n📞 ${data.tel}\n\nVotre commande est transmise en cuisine. À tout de suite chez Suprême ! 🔥`;
  addMsg(msg, 'ai');

  const entries = [
    ['Heure retrait', heure],
    ['Plat', data.plat],
    ['Extra', data.extra !== 'Non merci' ? data.extra : null],
    ['Allergie', data.allergie !== 'Aucune allergie ✅' ? data.allergie : null],
    ['Nom', data.nom],
    ['Téléphone', data.tel],
  ].filter(([,v]) => v);

  const sum = document.getElementById('summary');
  sum.classList.add('show');
  sum.innerHTML = `<h3>📋 Commande #${Math.floor(Math.random()*900)+100}</h3>` +
    entries.map(([k,v]) => `<div class="sum-row"><span class="sum-key">${k}</span><span class="sum-val">${v}</span></div>`).join('');

  const order = {
    id: Date.now(),
    numero: Math.floor(Math.random()*900)+100,
    nom: data.nom,
    tel: data.tel,
    plat: data.plat,
    extra: data.extra !== 'Non merci' ? data.extra : null,
    allergie: data.allergie !== 'Aucune allergie ✅' ? data.allergie : null,
    heure: heure,
    status: 'nouveau',
    timestamp: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
  };

  const orders = JSON.parse(localStorage.getItem('supreme_orders') || '[]');
  orders.unshift(order);
  localStorage.setItem('supreme_orders', JSON.stringify(orders));
  document.getElementById('sent-badge').classList.add('show');
}

function resetDemo() {
  step = 0; data = {};
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('choices').innerHTML = '';
  document.getElementById('input-row').style.display = 'none';
  document.getElementById('summary').className = 'summary';
  document.getElementById('summary').innerHTML = '';
  document.getElementById('sent-badge').className = 'sent-badge';
  document.getElementById('prog').style.width = '0%';
  addMsg(flow[0].ai, 'ai');
  showChoices(flow[0].choices);
}

resetDemo();
</script>
</body>
</html>
