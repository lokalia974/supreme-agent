<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Suprême — Écran Cuisine 👨‍🍳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0A0A;--surface:#161616;--surface2:#202020;--gold:#FFB800;--white:#F5F5F0;--muted:#555;--green:#00D26A;--red:#FF4D6D;--blue:#2979FF;--border:rgba(255,255,255,0.07)}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.logo-box{width:44px;height:44px;border-radius:12px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px}
.title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(255,77,109,0.15);border:1px solid rgba(255,77,109,0.3);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--red)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.stats-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border)}
.stat{flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.stat-n.gold{color:var(--gold)}
.stat-n.green{color:var(--green)}
.stat-n.red{color:var(--red)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

.filters{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg)}
.filters::-webkit-scrollbar{display:none}
.filter{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s}
.filter.active{background:var(--gold);color:#000;border-color:var(--gold)}

.orders-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:30px}

.order-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.3s;animation:slideIn 0.4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.order-card.nouveau{border-left:3px solid var(--gold);animation:slideIn 0.4s ease, glow 2s 3}
@keyframes glow{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(255,184,0,0.2)}}
.order-card.en-cours{border-left:3px solid var(--blue)}
.order-card.pret{border-left:3px solid var(--green);opacity:0.7}

.order-top{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.order-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--gold)}
.order-time-info{text-align:right}
.order-recu{font-size:11px;color:var(--muted)}
.order-heure{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.order-heure.urgent{color:var(--red)}

.order-body{padding:0 14px 12px}
.order-name{font-size:15px;font-weight:600;margin-bottom:4px}
.order-mode{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.mode-emporter{background:rgba(41,121,255,0.15);color:var(--blue)}
.mode-livraison{background:rgba(255,77,109,0.15);color:var(--red)}

.order-items{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.order-plat{font-size:14px;font-weight:600;margin-bottom:3px}
.order-extra{font-size:13px;color:var(--muted)}
.order-allergie{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#FFB800;background:rgba(255,184,0,0.1);border:1px solid rgba(255,184,0,0.2);border-radius:8px;padding:5px 10px;margin-top:6px}

.order-adresse{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:5px}

.order-actions{display:flex;gap:8px}
.action-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-start{background:var(--blue);color:white}
.btn-ready{background:var(--green);color:white}
.btn-done{background:var(--surface2);color:var(--muted);font-size:12px}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px}
.empty-sub{font-size:13px;margin-top:6px}

.new-alert{position:fixed;top:0;left:0;right:0;background:var(--gold);color:#000;padding:14px 20px;text-align:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;z-index:999;transform:translateY(-100%);transition:transform 0.4s}
.new-alert.show{transform:translateY(0)}

.clear-btn{display:block;margin:10px auto;background:none;border:1px solid var(--border);border-radius:10px;padding:8px 20px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
</style>
</head>
<body>

<div class="new-alert" id="new-alert">🔔 Nouvelle commande reçue !</div>

<div class="header">
  <div class="header-left">
    <div class="logo-box">👨‍🍳</div>
    <div>
      <div class="title">Écran Cuisine</div>
      <div class="subtitle">Suprême Saint-Denis</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-n gold" id="stat-new">0</div><div class="stat-l">Nouvelles</div></div>
  <div class="stat"><div class="stat-n" style="color:var(--blue)" id="stat-encours">0</div><div class="stat-l">En cours</div></div>
  <div class="stat"><div class="stat-n green" id="stat-pret">0</div><div class="stat-l">Prêtes</div></div>
</div>

<div class="filters">
  <div class="filter active" onclick="setFilter('all', this)">Tout</div>
  <div class="filter" onclick="setFilter('nouveau', this)">🆕 Nouvelles</div>
  <div class="filter" onclick="setFilter('en-cours', this)">🔥 En cours</div>
  <div class="filter" onclick="setFilter('pret', this)">✅ Prêtes</div>
  <div class="filter" onclick="setFilter('livraison', this)">🛵 Livraisons</div>
</div>

<div class="orders-list" id="orders-list">
  <div class="empty" id="empty-state">
    <div class="empty-icon">🍽️</div>
    <div class="empty-text">Aucune commande pour l'instant</div>
    <div class="empty-sub">Les commandes de l'agent IA apparaîtront ici automatiquement</div>
  </div>
</div>

<button class="clear-btn" onclick="clearDone()">🗑️ Effacer les commandes terminées</button>

<script>
let currentFilter = 'all';
let orders = [];
let lastCount = 0;

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function loadOrders() {
  const stored = localStorage.getItem('supreme_orders');
  if (stored) orders = JSON.parse(stored);
}

function saveOrders() {
  localStorage.setItem('supreme_orders', JSON.stringify(orders));
}

function updateStats() {
  document.getElementById('stat-new').textContent = orders.filter(o=>o.status==='nouveau').length;
  document.getElementById('stat-encours').textContent = orders.filter(o=>o.status==='en-cours').length;
  document.getElementById('stat-pret').textContent = orders.filter(o=>o.status==='pret').length;
}

function setStatus(id, status) {
  const o = orders.find(x=>x.id===id);
  if (o) { o.status = status; saveOrders(); renderOrders(); }
}

function clearDone() {
  orders = orders.filter(o=>o.status !== 'pret');
  saveOrders();
  renderOrders();
}

function renderOrders() {
  updateStats();
  let filtered = orders;
  if (currentFilter === 'livraison') filtered = orders.filter(o=>o.mode==='Livraison 🛵');
  else if (currentFilter !== 'all') filtered = orders.filter(o=>o.status===currentFilter);

  const list = document.getElementById('orders-list');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty" id="empty-state">
      <div class="empty-icon">🍽️</div>
      <div class="empty-text">Aucune commande ici</div>
      <div class="empty-sub">Les commandes apparaîtront automatiquement</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(o => {
    const isLivraison = o.mode === 'Livraison 🛵';
    const modeClass = isLivraison ? 'mode-livraison' : 'mode-emporter';
    const modeIcon = isLivraison ? '🛵' : '🥡';
    const cardClass = o.status;
    const heureUrgent = o.heure === 'Dès que possible ⚡' ? 'urgent' : '';

    let actions = '';
    if (o.status === 'nouveau') {
      actions = `<button class="action-btn btn-start" onclick="setStatus(${o.id},'en-cours')">🔥 Commencer</button>
                 <button class="action-btn btn-done" onclick="setStatus(${o.id},'pret')">✅ Prêt</button>`;
    } else if (o.status === 'en-cours') {
      actions = `<button class="action-btn btn-ready" onclick="setStatus(${o.id},'pret')">✅ Commande prête !</button>`;
    } else {
      actions = `<button class="action-btn btn-done" onclick="setStatus(${o.id},'termine')">🗑️ Archiver</button>`;
    }

    return `<div class="order-card ${cardClass}">
      <div class="order-top">
        <div>
          <div class="order-num">#${o.numero}</div>
          <div style="font-size:11px;color:var(--muted)">Reçu à ${o.timestamp}</div>
        </div>
        <div class="order-time-info">
          <div class="order-recu">${isLivraison ? 'Livraison' : 'Retrait'}</div>
          <div class="order-heure ${heureUrgent}">${o.heure}</div>
        </div>
      </div>
      <div class="order-body">
        <div class="order-name">👤 ${o.nom} — ${o.tel}</div>
        <div class="order-mode ${modeClass}">${modeIcon} ${o.mode}</div>
        <div class="order-items">
          <div class="order-plat">${o.plat}</div>
          ${o.extra ? `<div class="order-extra">+ ${o.extra}</div>` : ''}
          ${o.allergie ? `<div class="order-allergie">⚠️ ALLERGIE : ${o.allergie}</div>` : ''}
        </div>
        ${isLivraison && o.adresse ? `<div class="order-adresse">📍 ${o.adresse}</div>` : ''}
        <div class="order-actions">${actions}</div>
      </div>
    </div>`;
  }).join('');

  orders.filter(o=>o.status==='termine').forEach(o => {
    const idx = orders.indexOf(o);
    if (idx > -1) orders.splice(idx, 1);
  });
}

// Poll for new orders every 2 seconds
function pollOrders() {
  const prev = orders.length;
  loadOrders();
  if (orders.length > prev && prev > 0) {
    const alert = document.getElementById('new-alert');
    alert.classList.add('show');
    setTimeout(() => alert.classList.remove('show'), 3000);
    // Play sound
    try {
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }
  renderOrders();
}

// Init
loadOrders();
renderOrders();
setInterval(pollOrders, 2000);
</script>
</body>
</html>
